<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qwen3-8B MaritimeBench 回答助手</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="chat-container">
        <header class="chat-header">
            <h1>🤖 Qwen3-8B MaritimeBench 回答助手</h1>
            <button id="clearBtn" class="clear-btn">🗑️ 清空对话</button>
        </header>
        
        <div id="chatBox" class="chat-box">
            <div class="message assistant">
                <div class="avatar">🤖</div>
                <div class="bubble">你好！我是 Qwen3-8B MaritimeBench 回答助手，有什么可以帮你的吗？</div>
            </div>
        </div>
        
        <div class="input-area">
            <textarea id="userInput" placeholder="输入你的问题... (Shift+Enter 换行)" rows="3"></textarea>
            <button id="sendBtn" class="send-btn">发送</button>
        </div>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
